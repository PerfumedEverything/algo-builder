services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - algo-net

  # REDIS_URL must include password: redis://:${REDIS_PASSWORD}@redis:6379
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - algo-net

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    restart: unless-stopped
    networks:
      - algo-net

  price-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      - redis
      - nextjs
    restart: unless-stopped
    networks:
      - algo-net

  bybit-worker:
    build:
      context: .
      dockerfile: Dockerfile.bybit-worker
    command: npx tsx scripts/bybit-stream-worker.ts
    env_file: .env
    environment:
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - algo-net

  smoke-runner:
    build:
      context: .
      dockerfile: Dockerfile.smoke
    env_file: .env
    depends_on:
      - redis
      - nextjs
    restart: unless-stopped
    networks:
      - algo-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nextjs
    restart: unless-stopped
    networks:
      - algo-net

volumes:
  redis-data:

networks:
  algo-net:
    external: true
